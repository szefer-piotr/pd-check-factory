<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PD Check V2 Review</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
    th { background: #f5f5f5; }
    textarea { width: 100%; min-height: 64px; }
  </style>
</head>
<body>
  <h2>Study {{ study_id }} — {{ review_type }} review</h2>
  <label>Revision cycle: <input id="rev" type="checkbox" checked /></label>
  <button onclick="apply()">Apply Updates</button>
  <p id="status"></p>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Rule</th>
        <th>Text</th>
        <th>Refs</th>
        <th>Status</th>
        <th>DM Comment</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.deviation_id }}</td>
        <td>{{ row.rule_id }}</td>
        <td>{{ row.text if review_type == "deviations" else row.pseudo_logic }}</td>
        <td>{{ (row.paragraph_refs or [])|join(", ") }}</td>
        <td>
          <select id="status-{{ row.deviation_id }}">
            {% set current = row.status or "pending" %}
            {% for opt in ["pending","accepted","to_review","rejected"] %}
            <option value="{{ opt }}" {% if current == opt %}selected{% endif %}>{{ opt }}</option>
            {% endfor %}
          </select>
        </td>
        <td><textarea id="comment-{{ row.deviation_id }}">{{ row.dm_comment or "" }}</textarea></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <script>
    async function apply() {
      const updates = {};
      {% for row in rows %}
      updates["{{ row.deviation_id }}"] = {
        status: document.getElementById("status-{{ row.deviation_id }}").value,
        dm_comment: document.getElementById("comment-{{ row.deviation_id }}").value
      };
      {% endfor %}
      const resp = await fetch("/api/apply", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          review_type: "{{ review_type }}",
          updates,
          run_revision_cycle: document.getElementById("rev").checked
        })
      });
      const data = await resp.json();
      document.getElementById("status").innerText = JSON.stringify(data);
    }
  </script>
</body>
</html>
